# Reusable CI gate for projects that use bolt-cos-matic (ADR-0010).
#
# Copy this to `.github/workflows/bolt-cos-matic.yml` in your repository. It fails
# the build if your committed agent configs have drifted from `harness.toml`, or
# if a hard-gate goal is not met.
name: bolt-cos-matic

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2; cache the install build across runs

      - name: Install bolt-cos-matic
        # Pin to a released tag once available (append `--tag vX.Y.Z`); until then
        # this tracks the default branch. Once on crates.io: cargo install bolt-cos-matic
        run: cargo install --locked --git https://github.com/constantin-jais/bolt-cos-matic

      # `generate --check` also enforces hard gates, but a dedicated `goals` step
      # gives a clean, separate report (and surfaces observability metrics).
      - name: Goals
        run: bolt-cosmatic goals

      - name: Drift gate (committed outputs must match the source)
        run: bolt-cosmatic generate --check
