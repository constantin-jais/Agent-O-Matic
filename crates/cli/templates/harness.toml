[package]
name = "{{name}}"
builtins = ["stack-authority", "rust-core", "sovereign-stack", "artifact-first-release", "security-baseline", "biscuit-auth", "web-boundary", "testing-strategy", "tdd", "code-style"]

[[domains]]
name = "core-values"
priority = 10
content_file = "domains/core-values.md"

[[profiles]]
name = "default"
domains = ["stack-authority", "rust-core", "sovereign-stack", "artifact-first-release", "security-baseline", "biscuit-auth", "web-boundary", "testing-strategy", "tdd", "code-style", "core-values"]

[[goals]]
kind = "hard_gate"
check = "no-dead-domains"

[[goals]]
kind = "hard_gate"
check = "require-domains"
domains = ["stack-authority", "rust-core", "sovereign-stack", "artifact-first-release"]

{{adapter_targets}}

[autonomy]
level = "{{level}}"
# Autonomy levels (ADR: north-star-trustworthy-autonomy):
#   L0 = compile-only (no autonomy, zero risk)
#   L1 = bounded dispatch (proposes, human merges)
#   L2 = gated loop (auto-merges on green, requires approval policy)
#   L3 = trusted autonomy (full auto under sandbox + policy)
