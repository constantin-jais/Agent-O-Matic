name: ci

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # The repo is gated by its own primitive: `aom gate run` evaluates the hard
  # gates declared in goals.toml (fmt + clippy + tests) and exits non-zero on any
  # red gate. Job id kept as `check` so any required-status-check name stays stable.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace --locked
      - name: Gate-wall (aom gate run)
        run: cargo run -p aom-cli -- gate run --config goals.toml
